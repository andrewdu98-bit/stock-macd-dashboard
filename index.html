<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>股票信号监控</title><style>
:root{--blue:#1976c9;--green:#23b889;--red:#e35b66;--text:#142033;--muted:#6b7a90;--bg:#f6f8fb;--card:#fff;--line:#e8eef6}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}.wrap{max-width:1120px;margin:0 auto;padding:22px 16px 48px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:14px}h1{font-size:24px;margin:0;font-weight:800}.small{font-size:12px;color:var(--muted)}.tabs{display:flex;gap:8px;margin:10px 0 12px}.tab{background:#fff;color:#415066;border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-weight:850;box-shadow:0 2px 10px rgba(18,38,63,.04)}.tab.active{background:#1476c9;color:#fff;border-color:#1476c9}.info,.warn,.controls,.stats{background:#fff;border:1px solid var(--line);border-radius:12px;margin:10px 0;padding:12px 14px}.info{background:#eef7ff}.warn{background:#fff9e8;color:#745300}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;text-align:center;background:transparent;border:0;padding:0}.stat{border:1px solid var(--line);cursor:pointer;color:inherit;background:#fff;border-radius:14px;padding:12px 8px;box-shadow:0 2px 10px rgba(18,38,63,.04);transition:.15s ease}.stat b{display:block;font-size:24px;line-height:1;color:#102033;font-weight:850}.stat span{display:block;margin-top:6px;font-size:12px;color:#66758a;font-weight:650}.stat:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(18,38,63,.08)}.stat.active{border-color:#1f7ed0;background:#eef7ff;box-shadow:0 0 0 3px rgba(31,126,208,.16)}.stat.active b{color:#0b63b6}.stat:active{transform:translateY(1px)}.stat:nth-child(1){border-top:4px solid #f2b705}.stat:nth-child(2){border-top:4px solid #23b889}.stat:nth-child(3){border-top:4px solid #39a56f}.stat:nth-child(4){border-top:4px solid #e35b66}.stat:nth-child(5){border-top:4px solid #8da0b8}.stat:nth-child(6){border-top:4px solid #1976c9}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:14px;padding:16px;box-shadow:0 3px 14px rgba(18,38,63,.05)}.card.fav{border-left-color:#f2b705;box-shadow:0 5px 18px rgba(242,183,5,.13)}.head{display:flex;justify-content:space-between;gap:10px}.sym{font-weight:800}.name{font-size:12px;color:var(--muted);margin-top:2px}.actions{display:flex;gap:6px}.iconbtn{background:#f2f5f9;color:#415066;border:1px solid var(--line);border-radius:9px;padding:5px 8px;font-weight:800;cursor:pointer}.iconbtn.on{background:#fff6ce;color:#a77700;border-color:#f2d575}.iconbtn.danger{background:#fff1f2;color:#b42331}.price{font-size:25px;font-weight:800;margin:14px 0 2px}.date{font-size:12px;color:#8a96a8}.signal{display:flex;gap:8px;align-items:center;margin:8px 0 10px;flex-wrap:wrap}.pill{font-size:12px;border-radius:7px;padding:4px 7px;font-weight:700}.buy,.hold{background:#e8fbf4;color:#07865f}.sell{background:#ffecef;color:#bd3341}.watch{background:#eef3fa;color:#506174}.favpill{background:#fff4c2;color:#8a6200}.desc{font-size:12px;color:#5e6c80}.nums{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#fbfcfe;border-radius:10px;padding:9px;margin-top:10px}.num span{display:block;font-size:11px;color:#7c8ba0}.num b{font-size:13px}.chart{height:74px;margin-top:10px;display:flex;align-items:end;gap:3px}.bar{flex:1;border-radius:3px 3px 0 0;min-width:3px}.pos{background:linear-gradient(#54d6ad,#20ad81)}.neg{background:linear-gradient(#f28a91,#de5260)}.footer{margin-top:16px;color:var(--muted);font-size:12px}.loader{padding:30px;text-align:center;color:var(--muted)}button,input{font:inherit}button{background:#1476c9;color:white;border:0;border-radius:9px;padding:8px 12px;font-weight:700;cursor:pointer}input{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;margin-top:8px}.row{display:flex;gap:8px;align-items:center;margin-top:8px}@media(max-width:760px){.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr);gap:7px}.stat{padding:10px 6px}.stat b{font-size:21px}.wrap{padding:14px 10px}h1{font-size:20px}.price{font-size:22px}.nums{grid-template-columns:repeat(2,1fr)}.tabs{width:100%}.tab{flex:1}}
</style></head><body><main class="wrap"><div class="top"><div><h1 id="title">📈 MACD 信号监控</h1><div class="small" id="updated">GitHub Pages 静态版 · 股票列表只保存在本浏览器</div></div><button onclick="load(true)">刷新</button></div><nav class="tabs"><button class="tab active" id="tab-macd" onclick="setView('macd')">MACD</button><button class="tab" id="tab-ema" onclick="setView('ema')">EMA 8/21</button><button class="tab" id="tab-kdj" onclick="setView('kdj')">KDJ</button></nav><div class="warn">⚠️ 免责声明：这是辅助观察面板，不构成投资建议。数据来自 Yahoo Finance 公开接口；若浏览器 CORS 限制导致失败，请使用本机私有版。</div><section class="controls"><b>股票列表</b><input id="symbols" placeholder="例如 TSLA,NVDA,AVGO"><div class="row"><button onclick="saveSymbols()">保存到浏览器</button><button onclick="updatePublicWatchlist()">更新公共列表</button></div><input id="sharedPassword" type="password" placeholder="共享密码"><div class="small" id="saveMsg" style="margin-top:8px"></div></section><section class="stats"><button class="stat filter" onclick="toggleFilter('favorite')"><b id="favorite">0</b><span>我的持有</span></button><button class="stat filter" onclick="toggleFilter('buy')"><b id="buy">0</b><span>买入</span></button><button class="stat filter" onclick="toggleFilter('hold')"><b id="hold">0</b><span id="holdLabel">MACD 持有</span></button><button class="stat filter" onclick="toggleFilter('sell')"><b id="sell">0</b><span>卖出</span></button><button class="stat filter" onclick="toggleFilter('watch')"><b id="watch">0</b><span>观望</span></button><button class="stat filter" onclick="toggleFilter('total')"><b id="total">0</b><span>总数</span></button></section><section id="grid" class="grid"><div class="loader">输入股票后点击保存/刷新。</div></section><div class="footer" id="footer">周期：日线 6 个月；MACD 参数：12 / 26 / 9。“金叉第 N 天”按交易日计算。</div></main><script>
const DEFAULT_SYMBOLS=["AAPL","MSFT","NVDA","AMZN","GOOG","META","TSLA"];
const VIEW={macd:{title:'📈 MACD 信号监控',hold:'MACD 持有',footer:'周期：日线 6 个月；MACD 参数：12 / 26 / 9。“金叉第 N 天”按交易日计算。',labels:['DIF','DEA','HIST','多头金叉'],tail:'histTail'},ema:{title:'📊 EMA 8/21 信号监控',hold:'EMA 持有',footer:'周期：日线 6 个月；EMA 参数：8 / 21。“金叉第 N 天”按交易日计算。',labels:['EMA8','EMA21','差值','多头金叉'],tail:'spreadTail'},kdj:{title:'🛰️ KDJ 信号监控',hold:'KDJ 持有',footer:'周期：日线 6 个月；KDJ 参数：9 / 3 / 3。D<20 金叉为抄底信号，D>80 死叉为逃顶信号。',labels:['K','D','J','KDJ 金叉'],tail:'kdjTail'}};
let marketData=null;let activeFilter=null;let activeView=localStorage.signalView||'macd';
function norm(s){return String(s||'').split(/[\s,;，、]+/).map(x=>x.trim().toUpperCase().replace(/[^A-Z0-9.^-]/g,'')).filter(Boolean).filter((x,i,a)=>a.indexOf(x)===i)}
function favs(){try{return new Set(JSON.parse(localStorage.macdFavorites||'[]'))}catch{return new Set()}}
function setFavs(s){localStorage.macdFavorites=JSON.stringify([...s].sort())}
function syms(){return norm(localStorage.macdSymbols||DEFAULT_SYMBOLS.join(','))}
function money(n){return Number.isFinite(n)?'$'+n.toFixed(2):'—'}
function num(n){return Number.isFinite(n)?n.toFixed(2):'—'}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function bars(a){let max=Math.max(...a.map(x=>Math.abs(x)),.0001);return a.map(v=>'<div class="bar '+(v>=0?'pos':'neg')+'" style="height:'+(10+Math.abs(v)/max*60)+'px"></div>').join('')}
function crossText(it){if(!it.crossAge||!it.crossAge.bullish)return '未多头';return '金叉第 '+it.crossAge.days+' 天 · '+(it.crossAge.label||'')}
function crossClass(it){return it.crossAge&&it.crossAge.weakening?'sell':'hold'}
function metricValues(it){return activeView==='ema'?[it.ema8,it.ema21,it.spread]:activeView==='kdj'?[it.k,it.d,it.j]:[it.dif,it.dea,it.hist]}
function desc(k){if(activeView==='kdj')return k==='buy'?'D<20 金叉，抄底观察':k==='sell'?'D>80 死叉，逃顶风险':k==='hold'?'K>D，短线偏强':'等待超买/超卖区信号';return k==='buy'?'金叉出现，重点观察':k==='sell'?'死叉出现，注意风险':k==='hold'?'趋势偏多，继续跟踪':'等待更明确信号'}
function card(it){if(it.error)return '<article class="card"><div class="head"><div><div class="sym">'+esc(it.symbol)+'</div><div class="name">加载失败</div></div><button class="iconbtn danger" onclick="delSym(\''+esc(it.symbol)+'\')">删除</button></div><p class="small">'+esc(it.error)+'</p></article>';let k=it.signal.key,labels=VIEW[activeView].labels,vals=metricValues(it);return '<article class="card '+(it.favorite?'fav':'')+'"><div class="head"><div><div class="sym">'+esc(it.symbol)+'</div><div class="name">'+esc(it.name)+'</div></div><div class="actions"><button class="iconbtn '+(it.favorite?'on':'')+'" onclick="toggleFav(\''+esc(it.symbol)+'\')">'+(it.favorite?'★':'☆')+'</button><button class="iconbtn danger" onclick="delSym(\''+esc(it.symbol)+'\')">删除</button></div></div><div class="price">'+money(it.price)+' <span class="date">'+esc(it.date)+'</span></div><div class="signal"><span class="pill '+k+'">'+esc(it.signal.badge)+'</span>'+(it.favorite?'<span class="pill favpill">我的持有</span>':'')+'<span class="desc">'+desc(k)+'</span></div><div class="nums"><div class="num"><span>'+labels[0]+'</span><b>'+num(vals[0])+'</b></div><div class="num"><span>'+labels[1]+'</span><b>'+num(vals[1])+'</b></div><div class="num"><span>'+labels[2]+'</span><b>'+num(vals[2])+'</b></div><div class="num"><span>'+labels[3]+'</span><b class="'+crossClass(it)+'">'+esc(crossText(it))+'</b></div></div><div class="chart">'+bars(it[VIEW[activeView].tail]||[])+'</div></article>'}
async function getMarketData(force=false){if(marketData&&!force)return marketData;const r=await fetch('data.json?ts='+Date.now());if(!r.ok)throw new Error('data.json '+r.status);marketData=await r.json();return marketData}
function currentItems(d){if(d.views&&d.views[activeView])return d.views[activeView].items;if(activeView==='macd')return d.items;return (d.items||[]).map(x=>x.error?x:{symbol:x.symbol,name:x.name,date:x.date,price:x.price,error:(activeView==='kdj'?'KDJ':'EMA')+' 数据需要等下一次 GitHub Action 更新 data.json 后显示'});}
async function load(force=false){let list=syms();document.getElementById('symbols').value=list.join(', ');if(!list.length){document.getElementById('grid').innerHTML='<div class="loader">输入股票后点击保存/刷新。</div>';return}document.getElementById('grid').innerHTML='<div class="loader">加载中...</div>';try{const d=await getMarketData(force);let f=favs(),bySym=new Map((currentItems(d)||[]).map(x=>[x.symbol,x]));let allItems=list.map(s=>bySym.has(s)?{...bySym.get(s),favorite:f.has(s)}:{symbol:s,favorite:f.has(s),error:'此股票还没有预生成数据；等 GitHub Action 更新 data.json 后可显示'});let items=allItems.filter(x=>!activeFilter||activeFilter==='total'||(activeFilter==='favorite'?x.favorite:x.signal&&x.signal.key===activeFilter));let order={buy:0,hold:1,watch:2,sell:3};items.sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)||(order[a.signal?.key]??9)-(order[b.signal?.key]??9)||(b.crossAge?.days||0)-(a.crossAge?.days||0)||a.symbol.localeCompare(b.symbol));let counts={favorite:0,buy:0,hold:0,sell:0,watch:0,total:allItems.length};allItems.forEach(x=>{if(x.favorite)counts.favorite++;if(x.signal)counts[x.signal.key]++});Object.keys(counts).forEach(k=>document.getElementById(k).textContent=counts[k]||0);document.querySelectorAll('.stat.filter').forEach(el=>el.classList.remove('active'));if(activeFilter){const btn=document.querySelector('.stat.filter[onclick*="'+activeFilter+'"]');if(btn)btn.classList.add('active')}document.getElementById('updated').textContent='行情更新时间：'+new Date(d.generatedAt).toLocaleString()+' · GitHub Pages 静态版';document.getElementById('grid').innerHTML=items.map(card).join('')}catch(e){document.getElementById('grid').innerHTML='<div class="loader">加载失败：'+esc(e.message)+'</div>'}}
function applyView(){activeView=VIEW[activeView]?activeView:'macd';localStorage.signalView=activeView;document.getElementById('title').textContent=VIEW[activeView].title;document.getElementById('holdLabel').textContent=VIEW[activeView].hold;document.getElementById('footer').textContent=VIEW[activeView].footer;document.getElementById('tab-macd').classList.toggle('active',activeView==='macd');document.getElementById('tab-ema').classList.toggle('active',activeView==='ema');document.getElementById('tab-kdj').classList.toggle('active',activeView==='kdj')}
function setView(v){activeView=v;activeFilter=null;applyView();load()}
function toggleFilter(k){activeFilter=activeFilter===k?null:k;load()}
async function updatePublicWatchlist(){const msg=document.getElementById('saveMsg');if(location.hostname.endsWith('github.io')){msg.textContent='GitHub Pages 没有后端，更新公共列表请使用 Vercel 网址。';return}const symbols=norm(document.getElementById('symbols').value);const password=document.getElementById('sharedPassword').value;localStorage.macdSymbols=symbols.join(',');msg.textContent='正在更新公共列表并触发刷新...';try{const r=await fetch('/api/update-watchlist',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({symbols,password})});const text=await r.text();let d;try{d=JSON.parse(text)}catch{throw new Error('后端没有返回 JSON；请确认正在使用 Vercel 网址，而不是 GitHub Pages 网址。')}if(!r.ok||!d.ok)throw new Error(d.error||'更新失败');msg.textContent=d.message||'已更新公共列表，稍后刷新页面';}catch(e){msg.textContent='更新失败：'+e.message}}
function saveSymbols(){localStorage.macdSymbols=norm(document.getElementById('symbols').value).join(',');document.getElementById('saveMsg').textContent='已保存到浏览器';load(true)}
function delSym(s){localStorage.macdSymbols=syms().filter(x=>x!==s).join(',');let f=favs();f.delete(s);setFavs(f);load()}
function toggleFav(s){let f=favs();f.has(s)?f.delete(s):f.add(s);setFavs(f);load()}
applyView();load();
</script></body></html>
