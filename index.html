<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MACD 信号监控</title><style>
:root{--blue:#1976c9;--green:#23b889;--red:#e35b66;--text:#142033;--muted:#6b7a90;--bg:#f6f8fb;--card:#fff;--line:#e8eef6}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}.wrap{max-width:1120px;margin:0 auto;padding:22px 16px 48px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:14px}h1{font-size:24px;margin:0;font-weight:800}.small{font-size:12px;color:var(--muted)}.info,.warn,.controls,.stats{background:#fff;border:1px solid var(--line);border-radius:12px;margin:10px 0;padding:12px 14px}.info{background:#eef7ff}.warn{background:#fff9e8;color:#745300}.stats{display:grid;grid-template-columns:repeat(6,1fr);text-align:center}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:14px;padding:16px;box-shadow:0 3px 14px rgba(18,38,63,.05)}.card.fav{border-left-color:#f2b705;box-shadow:0 5px 18px rgba(242,183,5,.13)}.head{display:flex;justify-content:space-between;gap:10px}.sym{font-weight:800}.name{font-size:12px;color:var(--muted);margin-top:2px}.actions{display:flex;gap:6px}.iconbtn{background:#f2f5f9;color:#415066;border:1px solid var(--line);border-radius:9px;padding:5px 8px;font-weight:800;cursor:pointer}.iconbtn.on{background:#fff6ce;color:#a77700;border-color:#f2d575}.iconbtn.danger{background:#fff1f2;color:#b42331}.price{font-size:25px;font-weight:800;margin:14px 0 2px}.date{font-size:12px;color:#8a96a8}.signal{display:flex;gap:8px;align-items:center;margin:8px 0 10px;flex-wrap:wrap}.pill{font-size:12px;border-radius:7px;padding:4px 7px;font-weight:700}.buy,.hold{background:#e8fbf4;color:#07865f}.sell{background:#ffecef;color:#bd3341}.watch{background:#eef3fa;color:#506174}.favpill{background:#fff4c2;color:#8a6200}.desc{font-size:12px;color:#5e6c80}.nums{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#fbfcfe;border-radius:10px;padding:9px;margin-top:10px}.num span{display:block;font-size:11px;color:#7c8ba0}.num b{font-size:13px}.chart{height:74px;margin-top:10px;display:flex;align-items:end;gap:3px}.bar{flex:1;border-radius:3px 3px 0 0;min-width:3px}.pos{background:linear-gradient(#54d6ad,#20ad81)}.neg{background:linear-gradient(#f28a91,#de5260)}.footer{margin-top:16px;color:var(--muted);font-size:12px}.loader{padding:30px;text-align:center;color:var(--muted)}button,input{font:inherit}button{background:#1476c9;color:white;border:0;border-radius:9px;padding:8px 12px;font-weight:700;cursor:pointer}input{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;margin-top:8px}.row{display:flex;gap:8px;align-items:center;margin-top:8px}@media(max-width:760px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.wrap{padding:14px 10px}h1{font-size:20px}.price{font-size:22px}.nums{grid-template-columns:repeat(2,1fr)}}
</style></head><body><main class="wrap"><div class="top"><div><h1>📈 MACD 信号监控</h1><div class="small" id="updated">GitHub Pages 静态版 · 股票列表只保存在本浏览器</div></div><button onclick="load()">刷新</button></div><div class="info">公开版已内置和本机 watchlist 相同的股票代码。修改后会保存在浏览器 localStorage；⭐ 是“我的持有/收藏”，会排在最前。</div><div class="warn">⚠️ 免责声明：这是辅助观察面板，不构成投资建议。数据来自 Yahoo Finance 公开接口；若浏览器 CORS 限制导致失败，请使用本机私有版。</div><section class="controls"><b>股票列表</b><input id="symbols" placeholder="例如 TSLA,NVDA,AVGO"><div class="row"><button onclick="saveSymbols()">保存到浏览器</button><span class="small" id="saveMsg"></span></div></section><section class="stats"><div class="stat"><b id="favorite">0</b><span>我的持有</span></div><div class="stat"><b id="buy">0</b><span>买入</span></div><div class="stat"><b id="hold">0</b><span>MACD 持有</span></div><div class="stat"><b id="sell">0</b><span>卖出</span></div><div class="stat"><b id="watch">0</b><span>观望</span></div><div class="stat"><b id="total">0</b><span>总数</span></div></section><section id="grid" class="grid"><div class="loader">输入股票后点击保存/刷新。</div></section><div class="footer">周期：日线 6 个月；MACD 参数：12 / 26 / 9。“金叉第 N 天”按交易日计算。</div></main><script>
const DEFAULT_SYMBOLS=["SPY", "TSLA", "NVDA", "GM", "MSFT", "GOOG", "AVGO", "IAU", "MU", "IBIT", "AMAT", "GLW", "COHR", "ORCL", "SNDK", "AAPL", "AMD", "META", "SOXL", "INTC", "BE", "EWY", "BRT", "AXTI", "LITE", "AAOI", "AMZN", "JPM", "QQQ", "SOFI", "UUUU"];
const COMPANY={SPY:'SPDR S&P 500 ETF Trust',TSLA:'Tesla, Inc.',NVDA:'NVIDIA Corporation',GM:'General Motors Company',MSFT:'Microsoft Corporation',GOOG:'Alphabet Inc.',AVGO:'Broadcom Inc.',IAU:'iShares Gold Trust',MU:'Micron Technology, Inc.',IBIT:'iShares Bitcoin Trust ETF',AMAT:'Applied Materials, Inc.',GLW:'Corning Incorporated',COHR:'Coherent Corp.',ORCL:'Oracle Corporation',SNDK:'SanDisk Corporation',AAPL:'Apple Inc.',AMD:'Advanced Micro Devices, Inc.',META:'Meta Platforms, Inc.',SOXL:'Direxion Daily Semiconductor Bull 3X Shares',INTC:'Intel Corporation',BE:'Bloom Energy Corporation',EWY:'iShares MSCI South Korea ETF',BRT:'BRT Apartments Corp.',AXTI:'AXT, Inc.',LITE:'Lumentum Holdings Inc.',AAOI:'Applied Optoelectronics, Inc.',AMZN:'Amazon.com, Inc.',JPM:'JPMorgan Chase & Co.',QQQ:'Invesco QQQ Trust',SOFI:'SoFi Technologies, Inc.',UUUU:'Energy Fuels Inc.'};
function norm(s){return String(s||'').split(/[\s,;，、]+/).map(x=>x.trim().toUpperCase().replace(/[^A-Z0-9.^-]/g,'')).filter(Boolean).filter((x,i,a)=>a.indexOf(x)===i)}function favs(){try{return new Set(JSON.parse(localStorage.macdFavorites||'[]'))}catch{return new Set()}}function setFavs(s){localStorage.macdFavorites=JSON.stringify([...s].sort())}function syms(){return norm(localStorage.macdSymbols||DEFAULT_SYMBOLS.join(','))}function money(n){return Number.isFinite(n)?'$'+n.toFixed(2):'—'}function num(n){return Number.isFinite(n)?n.toFixed(2):'—'}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function ema(v,p){const k=2/(p+1);let prev=null;return v.map(x=>{prev=prev==null?x:x*k+prev*(1-k);return prev})}function macd(c){const e12=ema(c,12),e26=ema(c,26),dif=c.map((_,i)=>e12[i]-e26[i]),dea=ema(dif,9),hist=dif.map((x,i)=>x-dea[i]);return{dif,dea,hist}}function signal(hist,dif,dea){let n=hist.length-1,h=hist[n],hp=hist[n-1],d=dif[n],a=dea[n],dp=dif[n-1],ap=dea[n-1];if(d>a&&dp<=ap)return{key:'buy',label:'买入',badge:'金叉'};if(d<a&&dp>=ap)return{key:'sell',label:'卖出',badge:'死叉'};if(d>a&&h>=0)return{key:'hold',label:'持有',badge:'多头'};if(d<a&&h<=0)return{key:'watch',label:'观望',badge:'空头'};if(h>hp)return{key:'watch',label:'观望',badge:'动能增强'};return{key:'watch',label:'观望',badge:'等待'}}function age(dif,dea,rows){let n=dif.length-1;if(!(dif[n]>dea[n]))return{bullish:false,days:0};let idx=0;for(let i=n;i>=1;i--)if(dif[i]>dea[i]&&dif[i-1]<=dea[i-1]){idx=i;break}return{bullish:true,days:n-idx+1,date:rows[idx].date}}async function fetchSym(s){let url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(s)+'?range=6mo&interval=1d&includePrePost=false&events=div%2Csplits';let r=await fetch(url);if(!r.ok)throw new Error('Yahoo '+r.status);let j=await r.json(),x=j.chart.result[0],q=x.indicators.quote[0];let rows=x.timestamp.map((t,i)=>({date:new Date(t*1000).toISOString().slice(0,10),close:q.close[i]})).filter(r=>Number.isFinite(r.close));let c=rows.map(r=>r.close),m=macd(c),n=rows.length-1,sg=signal(m.hist,m.dif,m.dea),f=favs();return{symbol:s,name:COMPANY[s]||s,date:rows[n].date,price:rows[n].close,signal:sg,dif:m.dif[n],dea:m.dea[n],hist:m.hist[n],crossAge:age(m.dif,m.dea,rows),favorite:f.has(s),histTail:m.hist.slice(-28).map(x=>+x.toFixed(4))}}
function bars(a){let max=Math.max(...a.map(x=>Math.abs(x)),.0001);return a.map(v=>'<div class="bar '+(v>=0?'pos':'neg')+'" style="height:'+(10+Math.abs(v)/max*60)+'px"></div>').join('')}function crossText(it){return it.crossAge&&it.crossAge.bullish?'金叉第 '+it.crossAge.days+' 天':'未多头'}function card(it){if(it.error)return '<article class="card"><div class="head"><div><div class="sym">'+esc(it.symbol)+'</div><div class="name">加载失败</div></div><button class="iconbtn danger" onclick="delSym(\''+esc(it.symbol)+'\')">删除</button></div><p class="small">'+esc(it.error)+'</p></article>';let k=it.signal.key;return '<article class="card '+(it.favorite?'fav':'')+'"><div class="head"><div><div class="sym">'+esc(it.symbol)+'</div><div class="name">'+esc(it.name)+'</div></div><div class="actions"><button class="iconbtn '+(it.favorite?'on':'')+'" onclick="toggleFav(\''+esc(it.symbol)+'\')">'+(it.favorite?'★':'☆')+'</button><button class="iconbtn danger" onclick="delSym(\''+esc(it.symbol)+'\')">删除</button></div></div><div class="price">'+money(it.price)+' <span class="date">'+esc(it.date)+'</span></div><div class="signal"><span class="pill '+k+'">'+esc(it.signal.badge)+'</span>'+(it.favorite?'<span class="pill favpill">我的持有</span>':'')+'<span class="desc">'+(k==='buy'?'金叉出现，重点观察':k==='sell'?'死叉出现，注意风险':k==='hold'?'趋势偏多，继续跟踪':'等待更明确信号')+'</span></div><div class="nums"><div class="num"><span>DIF</span><b>'+num(it.dif)+'</b></div><div class="num"><span>DEA</span><b>'+num(it.dea)+'</b></div><div class="num"><span>HIST</span><b>'+num(it.hist)+'</b></div><div class="num"><span>多头金叉</span><b>'+esc(crossText(it))+'</b></div></div><div class="chart">'+bars(it.histTail)+'</div></article>'}async function load(){let list=syms();document.getElementById('symbols').value=list.join(', ');if(!list.length){document.getElementById('grid').innerHTML='<div class="loader">输入股票后点击保存/刷新。</div>';return}document.getElementById('grid').innerHTML='<div class="loader">加载中...</div>';let settled=await Promise.allSettled(list.map(fetchSym)),items=settled.map((r,i)=>r.status==='fulfilled'?r.value:{symbol:list[i],favorite:favs().has(list[i]),error:r.reason.message});let order={buy:0,hold:1,watch:2,sell:3};items.sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)||(order[a.signal?.key]??9)-(order[b.signal?.key]??9)||(b.crossAge?.days||0)-(a.crossAge?.days||0)||a.symbol.localeCompare(b.symbol));let counts={favorite:0,buy:0,hold:0,sell:0,watch:0,total:items.length};items.forEach(x=>{if(x.favorite)counts.favorite++;if(x.signal)counts[x.signal.key]++});Object.keys(counts).forEach(k=>document.getElementById(k).textContent=counts[k]||0);document.getElementById('updated').textContent='更新时间：'+new Date().toLocaleString()+' · GitHub Pages 静态版';document.getElementById('grid').innerHTML=items.map(card).join('')}function saveSymbols(){localStorage.macdSymbols=norm(document.getElementById('symbols').value).join(',');document.getElementById('saveMsg').textContent='已保存到浏览器';load()}function delSym(s){localStorage.macdSymbols=syms().filter(x=>x!==s).join(',');let f=favs();f.delete(s);setFavs(f);load()}function toggleFav(s){let f=favs();f.has(s)?f.delete(s):f.add(s);setFavs(f);load()}load();
</script></body></html>
